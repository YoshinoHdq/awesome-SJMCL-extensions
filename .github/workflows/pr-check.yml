name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".github/.markdownlint.json"
